name: AI Self-Healing Proxy v4

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-self-healing-proxy-v4
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade requests pyyaml

      - name: Generate Clash subscription
        run: |
          python generator.py
          mkdir -p docs
          cp output/clash.yaml docs/clash.yaml
          touch docs/.nojekyll

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/clash.yaml docs/clash.yaml docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Clash subscription"
            git push
          fi
